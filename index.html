<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingOo Surprise 👑</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap');

        body {
            text-align: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: bg 10s infinite alternate;
        }

        @keyframes bg {
            0% { background: #ff6a88; }
            33% { background: #fad0c4; }
            66% { background: #fbc2eb; }
            100% { background: #a18cd1; }
        }

        h1 {
            color: white;
            font-size: 32px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 10;
        }

        input {
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            outline: none;
            font-size: 16px;
            width: 80%;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            background: #000;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        #msg {
            font-size: 22px;
            color: white;
            margin-top: 25px;
            opacity: 0;
            transition: 0.8s;
            font-weight: bold;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
        }

        .heart {
            position: absolute;
            bottom: -50px;
            color: #ff4d4d;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: float Up 4s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💖 KingOo Surprise 👑</h1>
        <input type="text" id="name" placeholder="Apna pyaara naam likho 😍">
        <br>
        <button onclick="show()">Magic Click 🎁</button>
        <div id="msg"></div>
    </div>

    <script>
        function show() {
            let name = document.getElementById("name").value;
            if (name.trim() === "") {
                alert("Oye! Naam toh likho pehle 😄");
                return;
            }

            let msg = document.getElementById("msg");
            msg.innerHTML = "💖 " + name + " tum lucky ho 😍<br>KingOo tumhara best friend hai 👑🔥";
            msg.style.opacity = 1;

            // Heart animation
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    let heart = document.createElement("div");
                    heart.className = "heart";
                    heart.innerHTML = "❤️";
                    heart.style.left = Math.random() * 100 + "vw";
                    heart.style.fontSize = (Math.random() * 20 + 20) + "px";
                    heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
                    document.body.appendChild(heart);

                    // Remove heart from DOM after it floats away
                    setTimeout(() => { heart.remove(); }, 5000);
                }, i * 100);
            }
        }
    </script>
</body>
          </html>
